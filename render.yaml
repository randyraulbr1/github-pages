services:
  - type: web
    name: mariel-online-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tcodm.com,https://www.tcodm.com,https://randyraulbr1.github.io
      - key: GITHUB_REPO
        value: randyraulbr1/github-pages
      - key: GITHUB_BRANCH
        value: main
