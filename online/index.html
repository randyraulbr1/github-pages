<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariel Online</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 1rem; }
    a { color: #38bdf8; }
    code { background: #1e293b; padding: .2rem .4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div>
    <h1>🌍 Mariel Online</h1>
    <p id="msg">Conectando al servidor…</p>
    <p style="margin-top:1rem;font-size:.85rem;color:#94a3b8">
      Si no carga, edita <code>client/config.js</code> con la URL de tu servidor.
    </p>
  </div>
  <script src="../client/config.js"></script>
  <script>
    // Cuando despliegues el servidor, descomenta y pon tu URL:
    // window.MARIEL_ONLINE.SERVER_URL = 'https://tu-servidor.com';
    const base = location.pathname.replace(/\/online\/?.*$/, '');
    location.replace(base + '/client/index.html');
  </script>
</body>
</html>
