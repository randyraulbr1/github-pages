# Mantiene claude/web-rpg-gps-game-n3ybow al día con main (tcodm.com despliega ambas ramas).
name: Sync claude branch from main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fusionar main en claude/web-rpg-gps-game-n3ybow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main claude/web-rpg-gps-game-n3ybow
          git checkout claude/web-rpg-gps-game-n3ybow
          git pull --rebase origin claude/web-rpg-gps-game-n3ybow
          git merge origin/main -m "chore: sync claude desde main [auto]"
          for i in 1 2 3 4 5 6; do
            git push origin claude/web-rpg-gps-game-n3ybow && exit 0
            git pull --rebase origin claude/web-rpg-gps-game-n3ybow
            sleep $((i * 2))
          done
          echo "No se pudo hacer push a claude tras varios intentos"
          exit 1
