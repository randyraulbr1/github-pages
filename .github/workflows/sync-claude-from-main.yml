# Mantiene claude/web-rpg-gps-game-n3ybow al día con main (tcodm.com despliega ambas ramas).
name: Sync claude branch from main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sincronizar claude con main (sin conflictos)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main claude/web-rpg-gps-game-n3ybow
          git checkout -B claude/web-rpg-gps-game-n3ybow origin/claude/web-rpg-gps-game-n3ybow
          git reset --hard origin/main
          for i in 1 2 3 4 5 6; do
            git push --force-with-lease origin claude/web-rpg-gps-game-n3ybow && exit 0
            git fetch origin claude/web-rpg-gps-game-n3ybow
            git reset --hard origin/main
            sleep $((i * 2))
          done
          echo "No se pudo hacer push a claude tras varios intentos"
          exit 1
