# Mantiene despierto el servidor Render (plan gratis) con un ping cada 10 minutos.
name: Render warmup

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sfS --max-time 30 https://mariel-online.onrender.com/health
          echo " OK — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
