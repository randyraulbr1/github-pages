name: Deploy tcodm.com (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar sitio estático
        # '/online' con barra = solo carpeta raíz. Sin barra borra js/online/ (Amigos, sync, multijugador).
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='server' \
            --exclude='mariel-explorer' \
            --exclude='scripts' \
            --exclude='docs' \
            --exclude='client' \
            --exclude='/online' \
            --exclude='*.md' \
            --exclude='render.yaml' \
            --exclude='.gitignore' \
            ./ _site/

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
