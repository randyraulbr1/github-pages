# Kingdom Map — producción unificada (tcodm.com)
# Copiar a /etc/nginx/sites-available/tcodm.conf

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tcodm.com www.tcodm.com api.tcodm.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://tcodm.com$request_uri;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tcodm.com;
    ssl_certificate     /etc/letsencrypt/live/tcodm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tcodm.com/privkey.pem;
    return 301 https://tcodm.com$request_uri;
}

# Principal — static + API + WebSocket (tcodm.com + api.tcodm.com transición)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tcodm.com api.tcodm.com;

    ssl_certificate     /etc/letsencrypt/live/tcodm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tcodm.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /var/www/tcodm;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    client_max_body_size 16m;

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|json|webmanifest)$ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
