<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mariel Online — Mundo Compartido</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="pantalla-auth" class="pantalla">
    <div class="tarjeta-auth">
      <h1>🌍 Mariel Online</h1>
      <p class="subtitulo">Mundo compartido en tiempo real</p>

      <div id="form-login">
        <input id="login-user" type="text" placeholder="Usuario" autocomplete="username">
        <input id="login-pass" type="password" placeholder="Contraseña" autocomplete="current-password">
        <button id="btn-login" class="btn-principal">Entrar</button>
        <p class="enlace" id="ir-registro">¿No tienes cuenta? Regístrate</p>
      </div>

      <div id="form-registro" class="oculto">
        <input id="reg-user" type="text" placeholder="Usuario nuevo" autocomplete="username">
        <input id="reg-pass" type="password" placeholder="Contraseña (mín. 4)" autocomplete="new-password">
        <input id="reg-pass2" type="password" placeholder="Repetir contraseña">
        <button id="btn-registro" class="btn-principal">Crear cuenta</button>
        <p class="enlace" id="ir-login">Ya tengo cuenta</p>
      </div>

      <p id="auth-error" class="error oculto"></p>
    </div>
  </div>

  <div id="pantalla-juego" class="pantalla oculto">
    <header class="barra">
      <div class="stats">
        <span id="stat-nombre">—</span>
        <span>❤️ <b id="stat-hp">100</b></span>
        <span>🍖 <b id="stat-hunger">50</b></span>
        <span>⭐ Nv.<b id="stat-level">1</b></span>
      </div>
      <button id="btn-logout" class="btn-mini">Salir</button>
    </header>

    <div id="mapa-wrap">
      <canvas id="mapa" width="800" height="500"></canvas>
      <div id="lista-online" class="panel-lateral">
        <h3>Jugadores online</h3>
        <ul id="online-list"></ul>
      </div>
    </div>

    <div id="panel-misiones" class="panel-inferior">
      <h3>Misiones activas</h3>
      <ul id="missions-list"></ul>
    </div>

    <div id="panel-inventario" class="panel-inventario">
      <h3>Mochila</h3>
      <ul id="inventory-list"></ul>
    </div>

    <p id="game-log" class="log"></p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
